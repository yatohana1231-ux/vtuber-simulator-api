# ==============================================================================
# VTuber Simulator API - CI/CD Pipeline
# ==============================================================================
# トリガー:
#   - develop ブランチへの push → stg 環境へデプロイ
#   - main ブランチへの push    → prod 環境へデプロイ
#
# 前提条件 (GitHub リポジトリ側で設定が必要):
#   1. AWS OIDC Identity Provider を作成済み
#      - プロバイダURL: https://token.actions.githubusercontent.com
#      - 対象者: sts.amazonaws.com
#   2. GitHub Actions 用 IAM ロールを作成済み
#      - 信頼ポリシーで対象リポジトリ/ブランチを許可
#      - CDK デプロイに必要な権限を付与 (CloudFormation, Lambda, IAM, DynamoDB, API Gateway 等)
#   3. リポジトリの Settings > Secrets and variables > Actions に以下を登録:
#      - AWS_ROLE_ARN_STG  : stg 用 IAM ロール ARN
#      - AWS_ROLE_ARN_PROD : prod 用 IAM ロール ARN
# ==============================================================================

name: Deploy VTuber Simulator API

on:
  push:
    branches:
      - develop
      - main

# 同一ブランチで並行デプロイしないようにグループ化
concurrency:
  group: deploy-${{ github.ref_name }}
  cancel-in-progress: false

permissions:
  id-token: write   # OIDC トークン取得に必要
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # --------------------------------------------------
      # 1. チェックアウト
      # --------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. Node.js セットアップ
      # --------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # --------------------------------------------------
      # 3. ステージ名と IAM ロール ARN を決定
      # --------------------------------------------------
      - name: Determine stage
        id: stage
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "name=prod" >> "$GITHUB_OUTPUT"
            echo "role_arn=${{ secrets.AWS_ROLE_ARN_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=stg" >> "$GITHUB_OUTPUT"
            echo "role_arn=${{ secrets.AWS_ROLE_ARN_STG }}" >> "$GITHUB_OUTPUT"
          fi

      # --------------------------------------------------
      # 4. AWS 認証 (OIDC)
      # --------------------------------------------------
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ steps.stage.outputs.role_arn }}
          aws-region: ap-northeast-1

      # --------------------------------------------------
      # 5. アプリケーションのビルド
      # --------------------------------------------------
      - name: Install app dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build application
        run: npm run build

      # --------------------------------------------------
      # 6. CDK デプロイ
      # --------------------------------------------------
      - name: Install CDK dependencies
        working-directory: infra
        run: npm ci

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never --context stage=${{ steps.stage.outputs.name }}
